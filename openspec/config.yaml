schema: spec-driven

context: |
  Project: moo.md — mind on output. Thinking infrastructure for AI work.
  Stack: Claude Code plugins (SKILL.md, hooks.json, plugin.json). No runtime code — all prompt engineering.
  Plugins: hope (thinking pipeline), openspec (artifacts), claude-mem (memory)
  Conventions: conventional commits, kebab-case files, ≤200 lines per SKILL.md, manifesto tone
  Domain: AI-assisted software development — quality of thinking over quantity of output
  Philosophy: reduce decision regret, increase conceptual clarity, fewer but stronger artifacts, preserve ownership capacity

rules:
  proposal:
    - Focus on "why" not "how" — implementation belongs in design.md
    - Mark breaking changes with **BREAKING**
  tasks:
    - Each task completable in one session
    - Order by dependency (what must be done first)
